version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: delivery-backend
    environment:
      PORT: 8080
      PRICING_ALGO_VERSION: stable
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: delivery-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
