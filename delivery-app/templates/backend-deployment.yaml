apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "delivery-app.fullname" . }}-backend
  labels:
    app.kubernetes.io/component: backend
    {{- include "delivery-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "delivery-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        {{- include "delivery-app.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: PORT
              value: "{{ .Values.backend.service.port }}"
            - name: PRICING_ALGO_VERSION
              value: "{{ .Values.backend.env.pricingAlgoVersion }}"
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
