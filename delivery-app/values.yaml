global:
  imagePullPolicy: IfNotPresent

backend:
  replicaCount: 2
  image:
    repository: your-dockerhub-username/delivery-backend
    tag: latest
  service:
    port: 8080
  env:
    pricingAlgoVersion: stable
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

frontend:
  replicaCount: 2
  image:
    repository: your-dockerhub-username/delivery-frontend
    tag: latest
  service:
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: false
  className: nginx
  annotations: {}
  host: delivery.local
